<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delivery Pro Mini App</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- React & Babel for browser transpilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #f8fafc);
            color: var(--tg-theme-text-color, #0f172a);
            -webkit-tap-highlight-color: transparent;
        }
        .tg-secondary-bg { background-color: var(--tg-theme-secondary-bg-color, #f1f5f9); }
        .tg-button { background-color: var(--tg-theme-button-color, #4f46e5); color: var(--tg-theme-button-text-color, #ffffff); }
        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="custom-scroll">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // Mock Components for Lucide (using simple SVG paths as fallback for CDN simplicity)
        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [role, setRole] = useState('shop');
            const [activeTab, setActiveTab] = useState('home');
            const [showOrderModal, setShowOrderModal] = useState(false);
            const [tg, setTg] = useState(window.Telegram.WebApp);

            useEffect(() => {
                tg.ready();
                tg.expand();
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, showOrderModal, role]);

            const triggerHaptic = () => {
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            };

            // Main UI Components
            const StatusBadge = ({ status }) => {
                const colors = {
                    new: 'bg-blue-500/10 text-blue-500',
                    on_delivery: 'bg-orange-500/10 text-orange-500',
                    delivered: 'bg-green-500/10 text-green-500'
                };
                const labels = { new: 'Новый', on_delivery: 'В пути', delivered: 'Готов' };
                return (
                    <span className={`px-2 py-1 rounded-full text-[10px] font-bold uppercase ${colors[status] || colors.new}`}>
                        {labels[status] || '—'}
                    </span>
                );
            };

            return (
                <div className="min-h-screen pb-32 px-4 pt-6 max-w-md mx-auto">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center text-white shadow-lg">
                                <Icon name="user" />
                            </div>
                            <div>
                                <h1 className="font-bold text-lg leading-tight">
                                    {tg.initDataUnsafe?.user?.first_name || 'Пользователь'}
                                </h1>
                                <p className="text-xs opacity-60 flex items-center gap-1">
                                    <Icon name="map-pin" size={10} /> {role === 'shop' ? 'Магазин' : 'Курьер'}
                                </p>
                            </div>
                        </div>
                        <div className="bg-white/10 backdrop-blur-md p-1 rounded-2xl flex border border-black/5 shadow-sm">
                            <button 
                                onClick={() => { triggerHaptic(); setRole('shop'); }}
                                className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider transition-all ${role === 'shop' ? 'bg-indigo-600 text-white' : 'opacity-40'}`}
                            >Магазин</button>
                            <button 
                                onClick={() => { triggerHaptic(); setRole('courier'); }}
                                className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider transition-all ${role === 'courier' ? 'bg-indigo-600 text-white' : 'opacity-40'}`}
                            >Курьер</button>
                        </div>
                    </div>

                    {/* Balance Card */}
                    <div className="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-3xl p-6 text-white shadow-xl mb-6">
                        <p className="text-white/60 text-xs uppercase font-bold tracking-widest">Текущий баланс</p>
                        <h2 className="text-4xl font-black mt-1">₽15,400</h2>
                        <div className="mt-6 flex gap-3">
                            <div className="flex-1 bg-white/10 rounded-2xl p-3 border border-white/10">
                                <p className="text-[10px] opacity-60 uppercase">Заказы</p>
                                <p className="text-lg font-bold">128</p>
                            </div>
                            <div className="flex-1 bg-white/10 rounded-2xl p-3 border border-white/10">
                                <p className="text-[10px] opacity-60 uppercase">Рейтинг</p>
                                <p className="text-lg font-bold">4.9 ★</p>
                            </div>
                        </div>
                    </div>

                    {/* Actions */}
                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <button 
                            onClick={() => { triggerHaptic(); setShowOrderModal(true); }}
                            className="bg-white dark:bg-white/5 border border-black/5 p-4 rounded-3xl flex flex-col items-center gap-2 active:scale-95 transition-transform"
                        >
                            <div className="p-3 bg-indigo-50 text-indigo-600 rounded-2xl"><Icon name="plus-circle" /></div>
                            <span className="text-xs font-bold uppercase">Заказ</span>
                        </button>
                        <button className="bg-white dark:bg-white/5 border border-black/5 p-4 rounded-3xl flex flex-col items-center gap-2 active:scale-95 transition-transform">
                            <div className="p-3 bg-emerald-50 text-emerald-600 rounded-2xl"><Icon name="wallet" /></div>
                            <span className="text-xs font-bold uppercase">Выплаты</span>
                        </button>
                    </div>

                    {/* Orders List */}
                    <div className="space-y-4">
                        <h3 className="text-sm font-black uppercase opacity-40 px-1">Активные доставки</h3>
                        {[1042, 1041].map(id => (
                            <div key={id} className="bg-white dark:bg-white/5 border border-black/5 rounded-[32px] p-5 shadow-sm">
                                <div className="flex justify-between items-start mb-4">
                                    <span className="bg-slate-100 dark:bg-white/10 px-2 py-1 rounded-lg text-[10px] font-bold">#{id}</span>
                                    <StatusBadge status={id === 1042 ? 'new' : 'on_delivery'} />
                                </div>
                                <div className="space-y-3">
                                    <div className="flex items-center gap-3">
                                        <div className="w-2 h-2 rounded-full bg-indigo-600 shadow-[0_0_8px_rgba(79,70,229,0.5)]"></div>
                                        <p className="text-xs font-medium opacity-80">ул. Большая Садовая, 12</p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
                                        <p className="text-xs font-medium opacity-80">пр. Мира, 45, кв 12</p>
                                    </div>
                                </div>
                                <div className="mt-4 pt-4 border-t border-black/5 flex justify-between items-center">
                                    <p className="text-lg font-black text-indigo-600">₽450</p>
                                    <button className="text-[10px] font-bold uppercase text-indigo-600">Детали</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Navigation Bar */}
                    <div className="fixed bottom-6 left-4 right-4 max-w-md mx-auto bg-white/80 dark:bg-black/40 backdrop-blur-2xl rounded-[32px] p-2 flex justify-around shadow-2xl border border-white/20">
                        <button onClick={() => setActiveTab('home')} className={`p-4 rounded-2xl transition-all ${activeTab === 'home' ? 'bg-indigo-600 text-white shadow-lg' : 'opacity-40'}`}><Icon name="package" /></button>
                        <button onClick={() => setActiveTab('orders')} className={`p-4 rounded-2xl transition-all ${activeTab === 'orders' ? 'bg-indigo-600 text-white shadow-lg' : 'opacity-40'}`}><Icon name="history" /></button>
                        <button onClick={() => setActiveTab('profile')} className={`p-4 rounded-2xl transition-all ${activeTab === 'profile' ? 'bg-indigo-600 text-white shadow-lg' : 'opacity-40'}`}><Icon name="user" /></button>
                    </div>

                    {/* Modal */}
                    {showOrderModal && (
                        <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center" onClick={() => setShowOrderModal(false)}>
                            <div className="w-full bg-white dark:bg-slate-900 rounded-t-[40px] p-8 animate-in slide-in-from-bottom" onClick={e => e.stopPropagation()}>
                                <h3 className="text-2xl font-black mb-6">Создать заказ</h3>
                                <div className="space-y-4">
                                    <input className="w-full p-4 bg-slate-100 dark:bg-white/5 rounded-2xl border-none outline-none text-sm" placeholder="Откуда?" />
                                    <input className="w-full p-4 bg-slate-100 dark:bg-white/5 rounded-2xl border-none outline-none text-sm" placeholder="Куда?" />
                                    <div className="flex gap-4">
                                        <input className="flex-1 p-4 bg-slate-100 dark:bg-white/5 rounded-2xl border-none outline-none text-sm" placeholder="Цена" type="number" />
                                        <input className="flex-1 p-4 bg-slate-100 dark:bg-white/5 rounded-2xl border-none outline-none text-sm" placeholder="Телефон" type="tel" />
                                    </div>
                                    <button className="w-full bg-indigo-600 text-white font-bold py-5 rounded-3xl mt-4 shadow-xl active:scale-95 transition-all">ОПУБЛИКОВАТЬ</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
